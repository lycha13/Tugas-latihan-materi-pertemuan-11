<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tingkat Dasar</title>
</head>

<style>

/* L1-1 */

.btn1 {
    background-color: brown;
    color: azure;
    padding: 12px 28px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    transition: backgroun-color 0.3s ease,
                transform       0.2s ease,
                box-shadow      0.3s ease;
}

.btn1:hover {
    background-color: blueviolet;
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.25);
}

.btn1:active {
    transform: translateY(0);
    box-shadow: none;
}

/* L1-2 */

.btn2 {
    margin: 16px;
    width: 150px;
    height: 150px;
    background-color: brown;
    color: azure;
    padding: 12px 28px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    transition: border-radius 0.3s ease;
}

.btn2:hover {
    background-color: blueviolet;
    transform: translateY(-3px);
    border-radius: 50%;
    box-shadow: 0 8px 20px rgba(0,0,0,0.25);
}

.btn2:active {
    transform: translateY(0);
    box-shadow: none;
}

/* L1-3 */

.box {
    width: 120px;
    height: 120px;
    margin: 15px;
    display: inline-block;
    transition: transform 0.3s ease;
}

/* Kotak 1 - Rotate */
.box1 {
    background-color: red;
}

.box1:hover {
    transform: rotate(45deg);
}

/* Kotak 2 - Scale */
.box2 {
    background-color: blue;
}

.box2:hover {
    transform: scale(1.2);
}

/* Kotak 3 - Translate */
.box3 {
    background-color: green;
}

.box3:hover {
    transform: translateX(30px);
}

/* Kotak 4 - Skew */
.box4 {
    background-color: orange;
}

.box4:hover {
    transform: skew(20deg, 10deg);
}

/* L1-4 */

.btn4 {
    width: 120px;
    height: 120px;
    background-color: purple;
    margin: 15px;
    display: inline-block;

    transform-origin: left center;
    transition: transform 0.5s ease;
}

.btn4:hover {
    transform: rotateY(80deg);
}

/* L1-5 */

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }

    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.fade-text {
    font-size: 24px;
    font-weight: bold;
    color: #1565C0;

    animation: fadeInUp 1s ease forwards;
}

</style>

<body>

    <!-- L1-1 -->

    <h2>L1-1</h2>
    <div class="btn1"></div>

    <!--  L1-2  -->
     
    <h2>L1-2</h2>
    <div class="btn2"></div>
    <div class="btn3"></div>

    <!--  L1-3  -->

    <h2>L1-3</h2>
    <div class="box box1"></div>
    <div class="box box2"></div>
    <div class="box box3"></div>
    <div class="box box4"></div>

    <!--  L1-4  -->

    <h2>L1-4</h2>
    <div class="btn4"></div>
    
    <!--  L1-5  -->

    <h2>L1-5</h2>
    <h2 class="fade-text">
        Selamat Datang di Halaman Saya
    </h2>

</body>
</html>
