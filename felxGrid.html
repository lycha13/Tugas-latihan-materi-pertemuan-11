<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Stikom</title>
    <link rel="stylesheet"
    href="https://fonts.googleapis.com/icon?family=Material+Icons">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            height:100vh;
            background:url('https://i.pinimg.com/1200x/bc/dc/99/bcdc99980a64451e56863b814e9c5e94.jpg') center/cover no-repeat;
        }

        header{
            display:flex;
            justify-content:flex-end;
            padding:20px;
        }

        ul{
            display:flex;
            gap:20px;
            list-style:none;
            align-items:center;
        }

        main{
            height:85vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
        }

        h1{
            font-size:90px;
            margin-bottom:25px;
        }

        input{
            width:700px;
            max-width:90%;
            padding:15px;
            border:1px solid #ccc;
            border-radius:30px;
            font-size:16px;
        }

        .icon{
            font-size:28px;
            cursor:pointer;
        }

        .icon:hover {
            background:white;
            cursor:pointer;
        }

        .lingkaran:hover{
            background:gray;
            cursor:pointer;
        }

        .navbawah{
            margin-top:30px;
        }

        .kelompoklink{
            display:flex;
            gap:40px;
        }

        .item-link{
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:5px;
        }

        .lingkaran{
            width:60px;
            height:60px;
            background:white;
            border-radius:50%;
            display:flex;
            justify-content:center;
            align-items:center;
        }

    </style>
</head>

<body>

    <header>
        <nav>
            <ul>
                <li>Gmail</li>
                <li>Images</li>
                <li>
                    <span class="material-icons icon">apps</span>
                </li>
                <li>
                    <span class="material-icons icon">account_circle</span>
                </li>
            </ul>
        </nav>
    </header>

    <main>

        <h1 color>GI.PlayerSearch</h1>

        <input type="text" placeholder="Cari sesuatu...">

        <div class="navbawah">
            <div class="kelompoklink">
                
                <div class="item-link">
                    <div class="lingkaran">
                        <span class="material-icons">add</span>
                    </div>
                    <div class="teks">Tambah</div>
                </div>

                <div class="item-link">
                    <div class="lingkaran">
                        <span class="material-icons">history</span>
                    </div>
                    <div class="teks">Histori</div>
                </div>

                <div class="item-link">
                    <div class="lingkaran">
                        <span class="material-icons">star</span>
                    </div>
                    <div class="teks">Favorit</div>
                </div>

            </div>
        </div>

    </main>

</body>
</html>
